<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#18324a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009688;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Pulse line icon -->
  <g transform="translate(8, 15)">
    <!-- Envelope base -->
    <rect x="0" y="12" width="32" height="20" rx="2" fill="#18324a" opacity="0.1"/>
    <path d="M0 14 L16 24 L32 14" fill="none" stroke="#18324a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Pulse/heartbeat line overlay -->
    <polyline points="4,22 10,22 12,16 16,28 20,14 22,22 28,22" fill="none" stroke="url(#pulseGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: Pulse News -->
  <text x="48" y="36" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#18324a" letter-spacing="-0.5">
    Pulse News
  </text>

  <!-- Small dot accent -->
  <circle cx="188" cy="18" r="3" fill="#009688"/>
</svg>
