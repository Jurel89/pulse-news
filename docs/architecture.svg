<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#18324a"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#009688"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="460" rx="0" fill="#fafbfc"/>

  <rect x="60" y="140" width="680" height="290" rx="16" fill="white" stroke="#18324a" stroke-width="2" stroke-opacity="0.25" filter="url(#shadow)"/>
  <text x="400" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#18324a" letter-spacing="2" text-transform="uppercase">PULSE NEWS CONTAINER</text>
  <line x1="100" y1="182" x2="700" y2="182" stroke="#18324a" stroke-width="1" stroke-opacity="0.1"/>

  <rect x="120" y="210" width="180" height="80" rx="10" fill="#e8edf2" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="210" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#18324a">FastAPI</text>
  <text x="210" y="270" text-anchor="middle" font-size="12" fill="#18324a" fill-opacity="0.6">Backend API</text>

  <rect x="340" y="210" width="140" height="80" rx="10" fill="#e8edf2" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="410" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#18324a">SQLite</text>
  <text x="410" y="270" text-anchor="middle" font-size="12" fill="#18324a" fill-opacity="0.6">Database</text>

  <rect x="520" y="210" width="170" height="80" rx="10" fill="#e8edf2" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="605" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#18324a">APScheduler</text>
  <text x="605" y="270" text-anchor="middle" font-size="12" fill="#18324a" fill-opacity="0.6">Job Queue</text>

  <rect x="260" y="330" width="200" height="70" rx="10" fill="#e8edf2" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="360" y="363" text-anchor="middle" font-size="15" font-weight="700" fill="#18324a">React 19</text>
  <text x="360" y="383" text-anchor="middle" font-size="12" fill="#18324a" fill-opacity="0.6">Frontend (SPA)</text>

  <line x1="210" y1="290" x2="210" y2="330" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.3" marker-end="url(#arrow)"/>
  <line x1="300" y1="330" x2="300" y2="290" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.3" marker-start="url(#arrow)"/>

  <line x1="300" y1="250" x2="340" y2="250" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.3" marker-end="url(#arrow)"/>
  <line x1="480" y1="250" x2="520" y2="250" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.3" marker-end="url(#arrow)"/>

  <line x1="605" y1="290" x2="605" y2="310" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="605" y1="310" x2="460" y2="310" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="460" y1="310" x2="460" y2="330" stroke="#18324a" stroke-width="1.5" stroke-opacity="0.3" marker-end="url(#arrow)"/>

  <rect x="80" y="20" width="160" height="80" rx="10" fill="#e0f2f1" stroke="#009688" stroke-width="1.5" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="160" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#009688">Resend</text>
  <text x="160" y="77" text-anchor="middle" font-size="12" fill="#009688" fill-opacity="0.7">Email Delivery</text>

  <rect x="320" y="20" width="160" height="80" rx="10" fill="#e0f2f1" stroke="#009688" stroke-width="1.5" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="400" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#009688">LiteLLM</text>
  <text x="400" y="77" text-anchor="middle" font-size="12" fill="#009688" fill-opacity="0.7">AI / LLM Gateway</text>

  <rect x="560" y="20" width="160" height="80" rx="10" fill="#e0f2f1" stroke="#009688" stroke-width="1.5" stroke-opacity="0.3" filter="url(#shadow)"/>
  <text x="640" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#009688">Webhooks</text>
  <text x="640" y="77" text-anchor="middle" font-size="12" fill="#009688" fill-opacity="0.7">Delivery Events</text>

  <line x1="160" y1="100" x2="160" y2="140" stroke="#009688" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-teal)"/>
  <line x1="400" y1="100" x2="400" y2="140" stroke="#009688" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-teal)"/>
  <line x1="640" y1="100" x2="640" y2="140" stroke="#009688" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-teal)"/>

  <text x="110" y="450" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.7">Batch Send</text>
  <text x="400" y="450" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.7">Content Generation</text>
  <text x="690" y="450" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.7">Status Callbacks</text>
</svg>
