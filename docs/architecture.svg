<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c8d6e0"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#009688"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="800" height="440" rx="0" fill="#0d1b2a"/>

  <rect x="60" y="130" width="680" height="280" rx="16" fill="#152536" stroke="#1e3a52" stroke-width="2"/>
  <text x="400" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#5a8fa8" letter-spacing="2">PULSE NEWS CONTAINER</text>
  <line x1="100" y1="170" x2="700" y2="170" stroke="#1e3a52" stroke-width="1"/>

  <rect x="120" y="195" width="180" height="75" rx="10" fill="#1a3048" stroke="#2a4f6e" stroke-width="1.5"/>
  <text x="210" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#c8d6e0">FastAPI</text>
  <text x="210" y="250" text-anchor="middle" font-size="11" fill="#5a8fa8">Backend API</text>

  <rect x="340" y="195" width="140" height="75" rx="10" fill="#1a3048" stroke="#2a4f6e" stroke-width="1.5"/>
  <text x="410" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#c8d6e0">SQLite</text>
  <text x="410" y="250" text-anchor="middle" font-size="11" fill="#5a8fa8">Database</text>

  <rect x="520" y="195" width="170" height="75" rx="10" fill="#1a3048" stroke="#2a4f6e" stroke-width="1.5"/>
  <text x="605" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#c8d6e0">APScheduler</text>
  <text x="605" y="250" text-anchor="middle" font-size="11" fill="#5a8fa8">Job Queue</text>

  <rect x="260" y="310" width="200" height="65" rx="10" fill="#1a3048" stroke="#2a4f6e" stroke-width="1.5"/>
  <text x="360" y="340" text-anchor="middle" font-size="15" font-weight="700" fill="#c8d6e0">React 19</text>
  <text x="360" y="358" text-anchor="middle" font-size="11" fill="#5a8fa8">Frontend (SPA)</text>

  <line x1="230" y1="270" x2="290" y2="310" stroke="#5a8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="310" x2="240" y2="270" stroke="#5a8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="300" y1="232" x2="340" y2="232" stroke="#5a8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="232" x2="520" y2="232" stroke="#5a8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="605" y1="270" x2="605" y2="290" stroke="#5a8fa8" stroke-width="1.5"/>
  <line x1="605" y1="290" x2="460" y2="290" stroke="#5a8fa8" stroke-width="1.5"/>
  <line x1="460" y1="290" x2="460" y2="310" stroke="#5a8fa8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="80" y="15" width="160" height="75" rx="10" fill="#0a2e2e" stroke="#009688" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="160" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#00d4aa">Resend</text>
  <text x="160" y="68" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.8">Email Delivery</text>

  <rect x="320" y="15" width="160" height="75" rx="10" fill="#0a2e2e" stroke="#009688" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="400" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#00d4aa">LiteLLM</text>
  <text x="400" y="68" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.8">AI / LLM Gateway</text>

  <rect x="560" y="15" width="160" height="75" rx="10" fill="#0a2e2e" stroke="#009688" stroke-width="1.5" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="640" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#00d4aa">Webhooks</text>
  <text x="640" y="68" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.8">Delivery Events</text>

  <path d="M160 90 L160 115 L210 115 L210 195" fill="none" stroke="#009688" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-teal)"/>
  <path d="M400 90 L400 195" fill="none" stroke="#009688" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-teal)"/>
  <path d="M640 90 L640 115 L605 115 L605 195" fill="none" stroke="#009688" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-teal)"/>

  <text x="140" y="430" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.6">Batch Send</text>
  <text x="400" y="430" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.6">Content Generation</text>
  <text x="660" y="430" text-anchor="middle" font-size="11" fill="#009688" fill-opacity="0.6">Status Callbacks</text>
